name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Installa le dipendenze leggere del progetto.
          # torch/torchvision e sentence-transformers vengono esclusi dal CI:
          # pesano ~2 GB e i test mockano completamente gli embeddings.
          pip install \
            langchain>=0.2.0 \
            langchain-groq>=0.1.0 \
            langchain-huggingface>=0.0.3 \
            langchain-community>=0.2.0 \
            langchain-core>=0.2.0 \
            langchain-text-splitters>=0.2.0 \
            langgraph>=0.1.0 \
            groq \
            chromadb>=0.5.0 \
            pdfplumber>=0.11.0 \
            PyPDF2>=3.0.0 \
            fpdf2>=2.7.0 \
            reportlab \
            markdown>=3.6 \
            python-dotenv>=1.0.0 \
            tenacity>=8.2.0 \
            pytest>=8.0.0

      - name: Run tests
        env:
          # Chiave fittizia — tutti i test mockano le chiamate Groq
          GROQ_API_KEY: "gsk_test_placeholder"
        run: |
          python -m pytest tests/ -v --tb=short
